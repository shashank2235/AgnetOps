apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentops-frontend
  template:
    metadata:
      labels:
        app: agentops-frontend
    spec:
      containers:
        - name: frontend
          image: agentops-frontend:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: agentops-frontend
spec:
  selector:
    app: agentops-frontend
  ports:
    - port: 5173
      targetPort: 5173
      protocol: TCP
  type: ClusterIP
