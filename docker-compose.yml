# TetherOps — Agent Reliability Platform
# Full stack: PostgreSQL · Redis · Qdrant · Neo4j · Jaeger · Backend · Recovery Worker · Frontend
version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentops
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentops}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-agentops123}
    ports:
      - "7474:7474"
      - "7687:7687"

  jaeger:
    image: jaegertracing/all-in-one:1.59
    ports:
      - "16686:16686"
      - "4318:4318"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - neo4j
      - jaeger

  recovery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["python", "worker.py"]
    depends_on:
      - postgres
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pg_data:
